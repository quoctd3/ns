<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đồ ăn ngon cho Thùy Vân</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-orange: #ff7e5f;
            --warm-yellow: #feb47b;
            --deep-brown: #432818;
            --soft-cream: #fffaf0;
            --sage-green: #99ae92;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--soft-cream);
            color: var(--deep-brown);
            background-image: url('https://www.transparenttextures.com/patterns/pantry.png');
        }

        h1 {
            font-family: 'Dancing Script', cursive;
        }

        .journal-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 4px 15px rgba(67, 40, 24, 0.05);
            border: 1px solid #f0e4d7;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .journal-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 20px rgba(67, 40, 24, 0.1);
        }

        .input-focus:focus {
            border-color: var(--primary-orange);
            ring: 2px solid var(--primary-orange);
            outline: none;
        }

        .btn-gradient {
            background: linear-gradient(135deg, var(--primary-orange), var(--warm-yellow));
            color: white;
            transition: all 0.3s ease;
        }

        .tab-active {
            color: var(--primary-orange);
            font-weight: 700;
            background: white;
            box-shadow: 0 4px 12px rgba(255, 126, 95, 0.15);
        }

        @keyframes steam {
            0% { transform: translateY(0) scale(1); opacity: 0.5; }
            50% { transform: translateY(-10px) scale(1.2); opacity: 0.8; }
            100% { transform: translateY(-20px) scale(1.4); opacity: 0; }
        }

        .steam-icon {
            animation: steam 2s infinite;
        }

        .card-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }

        @media (min-width: 1024px) {
            .card-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .animate-pop {
            animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="min-h-screen pb-20">

    <header class="pt-12 pb-8 px-6 text-center">
        <div class="max-w-4xl mx-auto">
            <div class="inline-block relative">
                <i class="fas fa-mug-hot absolute -top-8 -left-8 text-2xl text-orange-400 steam-icon"></i>
                <h1 class="text-5xl md:text-6xl mb-2 text-orange-600">
                    Món Ngon Cho Thùy Vân
                </h1>
            </div>
            <p class="mt-4 text-orange-800/50 tracking-[0.2em] uppercase text-[10px] font-bold">
                Nhok Shyn • Special Menu for Wife
            </p>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4">
        
        <!-- Form nhập liệu -->
        <section class="mb-10">
            <details class="bg-white rounded-[25px] shadow-sm border border-orange-100 overflow-hidden group">
                <summary class="list-none p-5 cursor-pointer flex justify-between items-center text-orange-700 font-bold uppercase text-xs tracking-widest">
                    <span><i class="fas fa-plus-circle mr-2"></i> Thêm món mới vào sổ tay</span>
                    <i class="fas fa-chevron-down transition-transform group-open:rotate-180"></i>
                </summary>
                <div class="p-6 pt-0 border-t border-orange-50">
                    <form id="restaurantForm" class="grid grid-cols-1 md:grid-cols-12 gap-4">
                        <div class="md:col-span-6">
                            <input type="text" id="resName" required placeholder="Tên quán..." class="w-full px-4 py-3 rounded-xl bg-orange-50 border-transparent input-focus text-sm">
                        </div>
                        <div class="md:col-span-6">
                            <input type="text" id="resAddress" required placeholder="Địa chỉ..." class="w-full px-4 py-3 rounded-xl bg-orange-50 border-transparent input-focus text-sm">
                        </div>
                        <div class="md:col-span-12">
                            <input type="text" id="resDish" required placeholder="Những món nên thử..." class="w-full px-4 py-3 rounded-xl bg-orange-50 border-transparent input-focus text-sm">
                        </div>
                        <div class="md:col-span-6">
                            <input type="text" id="resTime" placeholder="Ghi chú (giờ mở, lưu ý...)" class="w-full px-4 py-3 rounded-xl bg-orange-50 border-transparent input-focus text-sm">
                        </div>
                        <div class="md:col-span-6">
                            <select id="resStatus" class="w-full px-4 py-3 rounded-xl bg-orange-50 border-transparent input-focus text-sm appearance-none cursor-pointer">
                                <option value="wishlist">Đợi dắt vợ đi ăn 💌</option>
                                <option value="visited_ok">Trải nghiệm OK ✨</option>
                                <option value="visited_bad">Trải nghiệm không OK 🍋</option>
                            </select>
                        </div>
                        <div class="md:col-span-12 flex justify-end">
                            <button type="submit" class="btn-gradient px-8 py-3 rounded-xl font-bold uppercase text-[10px] tracking-widest shadow-md">
                                Thêm vào menu
                            </button>
                        </div>
                    </form>
                </div>
            </details>
        </section>

        <!-- Bộ lọc 3 Tab -->
        <div class="flex flex-col gap-4 mb-8">
            <div class="flex flex-wrap bg-orange-100/50 p-1 rounded-2xl gap-1">
                <button onclick="changeTab('wishlist')" id="tab-wishlist" class="flex-1 min-w-[100px] py-3 rounded-xl text-[10px] font-bold transition-all tab-active">
                    DANH SÁCH CHỜ (<span id="count-wishlist">0</span>)
                </button>
                <button onclick="changeTab('visited_ok')" id="tab-visited_ok" class="flex-1 min-w-[100px] py-3 rounded-xl text-[10px] font-bold text-orange-400 transition-all">
                    TRẢI NGHIỆM OK (<span id="count-visited_ok">0</span>)
                </button>
                <button onclick="changeTab('visited_bad')" id="tab-visited_bad" class="flex-1 min-w-[100px] py-3 rounded-xl text-[10px] font-bold text-orange-400 transition-all">
                    KHÔNG OK (<span id="count-visited_bad">0</span>)
                </button>
            </div>
            
            <div class="relative group">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-orange-300"></i>
                <input type="text" id="searchInput" placeholder="Tìm theo tên quán hoặc món ăn..." 
                    class="w-full bg-white border border-orange-100 rounded-2xl px-10 py-3 text-sm focus:ring-2 focus:ring-orange-200 focus:outline-none shadow-sm">
            </div>
        </div>

        <!-- Danh sách -->
        <div id="restaurantList" class="card-grid"></div>

        <div id="emptyState" class="hidden text-center py-20 bg-white/40 rounded-[30px] border-2 border-dashed border-orange-200">
            <i class="fas fa-utensils text-orange-200 text-4xl mb-3"></i>
            <p class="text-orange-300 uppercase tracking-widest text-[10px] font-bold">Chưa có dữ liệu nào</p>
        </div>
    </main>

    <!-- Modal Review (Dùng chung cho cả cảm nhận và ghi chú sau khi ăn) -->
    <div id="noteModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-orange-950/30 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="bg-white rounded-[32px] p-8 shadow-2xl relative z-10 w-full max-w-sm border-4 border-orange-50 animate-pop">
            <h3 id="modalTitle" class="text-xl font-bold mb-1 text-orange-700 font-['Dancing_Script'] text-center"></h3>
            <p id="modalSubtitle" class="text-orange-300 text-[10px] uppercase tracking-widest mb-6 text-center"></p>
            <textarea id="modalNoteInput" rows="4" class="w-full px-5 py-4 rounded-2xl bg-orange-50 border-transparent focus:bg-white input-focus text-sm text-orange-900" placeholder="Viết vài dòng cảm nhận của Vân nè..."></textarea>
            <div class="flex gap-3 mt-6">
                <button onclick="closeModal()" class="flex-1 py-3 text-orange-300 text-[10px] font-bold uppercase tracking-widest">Hủy</button>
                <button id="saveModalBtn" class="flex-1 py-3 btn-gradient rounded-xl text-[10px] font-bold uppercase tracking-widest shadow-lg">Lưu lại</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 btn-gradient px-6 py-3 rounded-full shadow-xl opacity-0 transition-all z-[100] pointer-events-none text-[11px] font-bold flex items-center gap-2 whitespace-nowrap">
        <i class="fas fa-heart text-white"></i> <span id="toastMsg">Xong!</span>
    </div>

    <script>
        let currentTab = 'wishlist';
        let editingId = null;
        let pendingStatus = null; // Trạng thái đang đợi để gán sau khi điền ghi chú

        const initialData = [
            { id: 1, name: "BÁNH BAO PHÔ MAI THỊT XIÊN NƯỚNG", address: "134 PHÙ ĐỔNG", time: "", dish: "Thịt xiên nướng, bánh bao phô mai", status: "wishlist", note: "" },
            { id: 2, name: "Quán Tú Mơ (Ngô Quyền)", address: "Ngô Quyền", time: "", dish: "Cà tím Tú Mơ, Vịt lộn nấu bầu", status: "wishlist", note: "" },
            { id: 3, name: "Lẩu bò tiềm Yersin", address: "Yersin", time: "Gần trường Bẻo", dish: "Lẩu bò tiềm, Gỏi bò tái chanh", status: "wishlist", note: "" },
            { id: 4, name: "Bún đậu Phố cổ", address: "144 Phan Đình Phùng", time: "", dish: "Chả cá Lã Vọng, Bún nem cua bể, Ốc nhồi thịt, Lẩu cá tằm", status: "wishlist", note: "" },
            { id: 5, name: "BÁNH XÈO MIỀN TÂY CÔ BA", address: "3/3 BÀ TRIỆU", time: "11H - 21H", dish: "Bánh xèo miền Tây", status: "wishlist", note: "" },
            { id: 6, name: "Cá Tầm Tuyên", address: "Đà Lạt", time: "", dish: "Lẩu cá tầm, Cá tầm nướng", status: "wishlist", note: "" },
            { id: 7, name: "PAMI COFFEE", address: "Hai Bà Trưng", time: "", dish: "Bánh flan", status: "wishlist", note: "" },
            { id: 8, name: "BÒ TƠ NHÀ LỒNG", address: "Dã Chiến", time: "", dish: "Bò tơ, Cơm chiên", status: "wishlist", note: "" }
        ];

        let restaurants = JSON.parse(localStorage.getItem('thuyVanFood_v6'));
        if (!restaurants || restaurants.length === 0) {
            restaurants = initialData;
            localStorage.setItem('thuyVanFood_v6', JSON.stringify(restaurants));
        }

        function saveData() {
            localStorage.setItem('thuyVanFood_v6', JSON.stringify(restaurants));
            renderList(document.getElementById('searchInput').value);
            updateCounts();
        }

        function updateCounts() {
            document.getElementById('count-wishlist').innerText = restaurants.filter(r => r.status === 'wishlist').length;
            document.getElementById('count-visited_ok').innerText = restaurants.filter(r => r.status === 'visited_ok').length;
            document.getElementById('count-visited_bad').innerText = restaurants.filter(r => r.status === 'visited_bad').length;
        }

        function changeTab(tab) {
            currentTab = tab;
            ['wishlist', 'visited_ok', 'visited_bad'].forEach(t => {
                const el = document.getElementById(`tab-${t}`);
                if (t === tab) {
                    el.className = 'flex-1 min-w-[100px] py-3 rounded-xl text-[10px] font-bold transition-all tab-active';
                } else {
                    el.className = 'flex-1 min-w-[100px] py-3 rounded-xl text-[10px] font-bold text-orange-400 transition-all';
                }
            });
            renderList();
        }

        // Mở modal khi bấm Ăn OK, Không OK hoặc khi muốn sửa ghi chú
        function openReviewModal(id, targetStatus = null) {
            editingId = id;
            pendingStatus = targetStatus;
            const res = restaurants.find(r => r.id === id);
            
            document.getElementById('modalNoteInput').value = res.note || "";
            
            if (targetStatus === 'visited_ok') {
                document.getElementById('modalTitle').innerText = 'Trải nghiệm tuyệt vời! ✨';
                document.getElementById('modalSubtitle').innerText = 'Điều gì làm Vân hài lòng nhất?';
            } else if (targetStatus === 'visited_bad') {
                document.getElementById('modalTitle').innerText = 'Trải nghiệm chưa tốt 🍋';
                document.getElementById('modalSubtitle').innerText = 'Vân thấy quán cần cải thiện gì nè?';
            } else {
                document.getElementById('modalTitle').innerText = 'Cảm nhận của Vân';
                document.getElementById('modalSubtitle').innerText = 'Chỉnh sửa lại kỷ niệm';
            }
            
            document.getElementById('noteModal').classList.remove('hidden');
            setTimeout(() => document.getElementById('modalNoteInput').focus(), 100);
        }

        function closeModal() {
            document.getElementById('noteModal').classList.add('hidden');
            editingId = null;
            pendingStatus = null;
        }

        document.getElementById('saveModalBtn').onclick = () => {
            const index = restaurants.findIndex(r => r.id === editingId);
            const noteText = document.getElementById('modalNoteInput').value;
            
            restaurants[index].note = noteText;
            
            if (pendingStatus) {
                restaurants[index].status = pendingStatus;
                let msg = pendingStatus === 'visited_ok' ? "Món ngon đã vào sổ tay! ✨" : "Đã ghi chú lại để rút kinh nghiệm 🍋";
                showToast(msg);
            } else {
                showToast('Đã cập nhật ghi chú!');
            }
            
            saveData();
            closeModal();
        }

        function setStatus(id, status) {
            // Thay vì đổi trạng thái ngay, ta mở modal để nhập ghi chú
            openReviewModal(id, status);
        }

        function moveToWishlist(id) {
            const index = restaurants.findIndex(r => r.id === id);
            restaurants[index].status = 'wishlist';
            saveData();
            showToast('Đã chuyển lại về danh sách chờ!');
        }

        function deleteItem(id) {
            if(confirm('Xóa quán này khỏi sổ tay nhé?')) {
                restaurants = restaurants.filter(r => r.id !== id);
                saveData();
                showToast('Đã xóa!');
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 3000);
        }

        function renderList(query = '') {
            const container = document.getElementById('restaurantList');
            container.innerHTML = '';
            
            const filtered = restaurants.filter(r => 
                r.status === currentTab && 
                (r.name.toLowerCase().includes(query.toLowerCase()) || r.dish.toLowerCase().includes(query.toLowerCase()))
            );

            document.getElementById('emptyState').classList.toggle('hidden', filtered.length > 0);

            filtered.sort((a, b) => b.id - a.id).forEach(res => {
                const card = document.createElement('div');
                card.className = 'journal-card p-5 flex flex-col md:flex-row gap-4 items-start md:items-center relative';
                
                card.innerHTML = `
                    <div class="flex-1 w-full">
                        <div class="flex justify-between items-start mb-1">
                            <h3 class="text-base font-bold text-orange-900 leading-tight">${res.name}</h3>
                            <span class="text-[9px] font-bold text-orange-300 uppercase tracking-tighter whitespace-nowrap ml-2">${res.time || ''}</span>
                        </div>
                        <div class="text-[10px] text-orange-400 font-semibold mb-3">
                            <i class="fas fa-map-marker-alt mr-1"></i> ${res.address}
                        </div>
                        <div class="bg-orange-50/70 px-3 py-2 rounded-xl">
                            <span class="text-[9px] uppercase font-bold text-orange-300 block mb-1">Những món nên thử</span>
                            <span class="text-xs text-orange-800 font-medium leading-relaxed">${res.dish}</span>
                        </div>
                        ${res.note ? `
                            <p onclick="openReviewModal(${res.id})" class="text-[10px] text-slate-400 italic mt-2 line-clamp-2 cursor-pointer border-l-2 border-orange-100 pl-2">💬 "${res.note}"</p>
                        ` : ''}
                    </div>

                    <!-- Action Section -->
                    <div class="flex md:flex-col gap-2 w-full md:w-auto border-t md:border-t-0 md:border-l border-orange-50 pt-3 md:pt-0 md:pl-4">
                        ${res.status === 'wishlist' ? `
                            <button onclick="setStatus(${res.id}, 'visited_ok')" class="flex-1 text-[9px] font-bold uppercase tracking-widest text-white bg-emerald-400 py-2.5 md:px-4 rounded-lg hover:bg-emerald-500 transition-all flex items-center justify-center gap-2">
                                <i class="fas fa-smile"></i> Ăn OK
                            </button>
                            <button onclick="setStatus(${res.id}, 'visited_bad')" class="flex-1 text-[9px] font-bold uppercase tracking-widest text-white bg-rose-400 py-2.5 md:px-4 rounded-lg hover:bg-rose-500 transition-all flex items-center justify-center gap-2">
                                <i class="fas fa-frown"></i> Không OK
                            </button>
                        ` : `
                            <button onclick="moveToWishlist(${res.id})" class="flex-1 text-[9px] font-bold uppercase tracking-widest text-orange-600 bg-orange-100/50 py-2 md:px-4 rounded-lg hover:bg-orange-100 transition-all flex items-center justify-center gap-2">
                                <i class="fas fa-undo"></i> Chờ ăn lại
                            </button>
                            <button onclick="openReviewModal(${res.id})" class="flex-1 text-[9px] font-bold uppercase tracking-widest text-blue-500 bg-blue-50 py-2 md:px-4 rounded-lg hover:bg-blue-100 transition-all flex items-center justify-center gap-2">
                                <i class="fas fa-edit"></i> Sửa ghi chú
                            </button>
                        `}
                        <button onclick="deleteItem(${res.id})" class="p-2 text-orange-200 hover:text-red-400 transition-colors text-center">
                            <i class="fas fa-trash-alt text-xs"></i>
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        document.getElementById('restaurantForm').onsubmit = function(e) {
            e.preventDefault();
            const newItem = {
                id: Date.now(),
                name: document.getElementById('resName').value,
                address: document.getElementById('resAddress').value,
                time: document.getElementById('resTime').value,
                dish: document.getElementById('resDish').value,
                status: document.getElementById('resStatus').value,
                note: ""
            };
            restaurants.unshift(newItem);
            saveData();
            this.reset();
            showToast('Đã thêm món mới vào thực đơn!');
        };

        document.getElementById('searchInput').oninput = (e) => renderList(e.target.value);
        window.onload = () => { updateCounts(); renderList(); };
    </script>
</body>
</html>
