<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đồ ăn ngon cho công chúa - Born Pink Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Be+Vietnam+Pro:wght@300;400;600;800&family=Urbanist:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bp-pink: #f32c89;
            --bp-dark-pink: #a11d5a;
            --bp-black: #050505;
            --bp-gray: #1a1a1a;
            --text-light: #ffffff;
        }

        body {
            font-family: 'Urbanist', sans-serif;
            background-color: var(--bp-black);
            color: var(--text-light);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(243, 44, 137, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(243, 44, 137, 0.1) 0%, transparent 40%);
            background-attachment: fixed;
        }

        /* Font tiêu đề mới hỗ trợ Tiếng Việt tốt hơn */
        .bp-font {
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
        }

        .journal-card {
            background: rgba(26, 26, 26, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(243, 44, 137, 0.2);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .journal-card:hover {
            transform: translateY(-5px) scale(1.01);
            border-color: var(--bp-pink);
            box-shadow: 0 0 20px rgba(243, 44, 137, 0.2);
            background: rgba(35, 35, 35, 0.8);
        }

        .btn-bp-gradient {
            background: linear-gradient(90deg, var(--bp-pink), #ff64b4);
            color: white;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        .btn-bp-gradient:hover {
            box-shadow: 0 0 15px var(--bp-pink);
            transform: translateY(-2px);
        }

        .tab-active {
            color: white;
            background: var(--bp-pink);
            box-shadow: 0 0 15px rgba(243, 44, 137, 0.4);
        }

        .input-bp {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(243, 44, 137, 0.3);
            color: white;
            transition: all 0.3s;
        }

        .input-bp:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--bp-pink);
            outline: none;
            box-shadow: 0 0 8px rgba(243, 44, 137, 0.3);
        }

        @keyframes neonPulse {
            0%, 100% { text-shadow: 0 0 8px var(--bp-pink), 0 0 12px var(--bp-pink); }
            50% { text-shadow: 0 0 15px var(--bp-pink), 0 0 25px var(--bp-pink); }
        }

        .neon-text {
            animation: neonPulse 2.5s infinite;
        }

        .shyn-logo {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            letter-spacing: 3px;
            background: linear-gradient(to right, #ffffff, var(--bp-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .square-btn {
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .square-btn:active {
            transform: scale(0.9);
        }

        details summary::-webkit-details-marker {
            display: none;
        }
    </style>
</head>
<body class="min-h-screen pb-24">

    <header class="pt-16 pb-12 px-6 text-center">
        <div class="max-w-4xl mx-auto flex flex-col items-center">
            <!-- Đã sửa lỗi font tiếng Việt ở đây -->
            <h1 class="bp-font text-3xl md:text-5xl font-black mb-6 tracking-tight neon-text text-white">
                Đồ ngon <span class="text-[#f32c89]">cho vợ</span>
            </h1>
            
            <div class="flex items-center gap-3">
                <span class="h-[1px] w-8 bg-pink-600"></span>
                <span class="shyn-logo text-[10px]">NHOKSHYN</span>
                <span class="h-[1px] w-8 bg-pink-600"></span>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4">
        
        <!-- Action Buttons -->
        <div class="flex flex-wrap gap-3 mb-12 justify-center">
             <button onclick="exportToZalo()" class="bg-[#0084FF] hover:bg-blue-600 text-white px-6 py-2 rounded-lg text-xs font-semibold shadow-lg transition-all flex items-center gap-2">
                <i class="fas fa-paper-plane"></i> Gửi Zalo
            </button>
            <button onclick="downloadBackup()" class="bg-[#1a1a1a] border border-pink-600 text-pink-500 hover:bg-pink-600 hover:text-white px-6 py-2 rounded-lg text-xs font-semibold shadow-lg transition-all flex items-center gap-2">
                <i class="fas fa-download"></i> Lưu File
            </button>
            <label class="bg-[#1a1a1a] border border-gray-600 text-gray-400 hover:border-white hover:text-white px-6 py-2 rounded-lg text-xs font-semibold shadow-lg transition-all flex items-center gap-2 cursor-pointer">
                <i class="fas fa-upload"></i> Nạp File
                <input type="file" id="importFile" class="hidden" accept=".json" onchange="importBackup(event)">
            </label>
        </div>

        <!-- New Item Form -->
        <section class="mb-12">
            <details class="bg-gray-900/50 backdrop-blur rounded-2xl border border-pink-900/30 overflow-hidden group">
                <summary class="list-none p-5 cursor-pointer flex justify-between items-center text-pink-500 font-bold text-sm tracking-wide">
                    <span><i class="fas fa-plus mr-3 text-xs"></i> Thêm quán mới</span>
                    <i class="fas fa-chevron-down transition-transform group-open:rotate-180"></i>
                </summary>
                <div class="p-8 pt-2 border-t border-pink-900/20">
                    <form id="restaurantForm" class="grid grid-cols-1 md:grid-cols-12 gap-5">
                        <div class="md:col-span-6">
                            <label class="block text-[10px] text-gray-500 font-bold mb-1 ml-1 uppercase tracking-widest">Tên quán</label>
                            <input type="text" id="resName" required placeholder="Ví dụ: Bánh mì muối ớt..." class="w-full px-5 py-4 rounded-xl input-bp text-sm font-medium">
                        </div>
                        <div class="md:col-span-6">
                            <label class="block text-[10px] text-gray-500 font-bold mb-1 ml-1 uppercase tracking-widest">Địa chỉ</label>
                            <input type="text" id="resAddress" required placeholder="Nhập địa chỉ hoặc khu vực..." class="w-full px-5 py-4 rounded-xl input-bp text-sm font-medium">
                        </div>
                        <div class="md:col-span-12">
                            <label class="block text-[10px] text-gray-500 font-bold mb-1 ml-1 uppercase tracking-widest">Món ngon nên thử</label>
                            <input type="text" id="resDish" required placeholder="Các món ngăn cách bằng dấu phẩy..." class="w-full px-5 py-4 rounded-xl input-bp text-sm font-medium">
                        </div>
                        <div class="md:col-span-6">
                            <label class="block text-[10px] text-gray-500 font-bold mb-1 ml-1 uppercase tracking-widest">Ghi chú thêm</label>
                            <input type="text" id="resTime" placeholder="Thời gian mở cửa hoặc lưu ý..." class="w-full px-5 py-4 rounded-xl input-bp text-sm font-medium">
                        </div>
                        <div class="md:col-span-6">
                            <label class="block text-[10px] text-gray-500 font-bold mb-1 ml-1 uppercase tracking-widest">Trạng thái</label>
                            <select id="resStatus" class="w-full px-5 py-4 rounded-xl input-bp text-sm cursor-pointer font-bold text-pink-500">
                                <option value="wishlist">Đợi dắt vợ đi ăn 🎀</option>
                                <option value="visited_ok">Trải nghiệm OK 🔥</option>
                                <option value="visited_bad">Trải nghiệm không OK 🖤</option>
                            </select>
                        </div>
                        <div class="md:col-span-12 flex justify-center mt-4">
                            <button type="submit" class="btn-bp-gradient px-16 py-4 rounded-xl font-bold text-sm shadow-xl">
                                Lưu vào danh sách
                            </button>
                        </div>
                    </form>
                </div>
            </details>
        </section>

        <!-- Tabs & Search -->
        <div class="flex flex-col gap-6 mb-12">
            <div class="flex bg-gray-900/80 p-1.5 rounded-xl border border-pink-900/30">
                <button onclick="changeTab('wishlist')" id="tab-wishlist" class="flex-1 py-3 rounded-lg text-xs font-bold transition-all tab-active">
                    Danh sách chờ (<span id="count-wishlist">0</span>)
                </button>
                <button onclick="changeTab('visited_ok')" id="tab-visited_ok" class="flex-1 py-3 rounded-lg text-xs font-bold text-gray-500 transition-all">
                    Yêu thích (<span id="count-visited_ok">0</span>)
                </button>
                <button onclick="changeTab('visited_bad')" id="tab-visited_bad" class="flex-1 py-3 rounded-lg text-xs font-bold text-gray-500 transition-all">
                    Bỏ qua (<span id="count-visited_bad">0</span>)
                </button>
            </div>
            
            <div class="relative">
                <i class="fas fa-search absolute left-6 top-1/2 -translate-y-1/2 text-pink-500"></i>
                <input type="text" id="searchInput" placeholder="Tìm kiếm món ngon cho công chúa..." 
                    class="w-full bg-gray-900/60 border border-pink-900/20 rounded-xl px-14 py-4 text-sm focus:border-pink-500 focus:outline-none transition-all font-medium text-white shadow-inner">
            </div>
        </div>

        <div id="restaurantList" class="grid grid-cols-1 lg:grid-cols-2 gap-6"></div>

        <div id="emptyState" class="hidden text-center py-24 bg-gray-900/30 rounded-3xl border-2 border-dashed border-pink-900/20">
            <i class="fas fa-utensils text-pink-900 text-5xl mb-4 opacity-20"></i>
            <p class="text-gray-500 text-sm font-medium">Chưa có quán nào trong danh sách này</p>
        </div>
    </main>

    <!-- Edit/Note Modal -->
    <div id="noteModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="bg-gray-900 border border-pink-600/50 rounded-2xl p-8 shadow-2xl relative z-10 w-full max-w-lg max-h-[90vh] overflow-y-auto">
            <h3 id="modalTitle" class="text-lg font-bold mb-1 text-pink-500 text-center tracking-tight">Cập nhật thông tin</h3>
            <p id="modalSubtitle" class="text-gray-500 text-[10px] uppercase tracking-widest mb-6 text-center font-bold">Chỉnh sửa nội dung cho công chúa</p>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] text-gray-500 font-bold mb-1 ml-1 uppercase tracking-widest">Tên quán</label>
                    <input type="text" id="editModalName" class="w-full px-5 py-3 rounded-xl bg-black border border-pink-900/40 focus:border-pink-500 text-sm text-white font-medium outline-none">
                </div>
                <div>
                    <label class="block text-[10px] text-gray-500 font-bold mb-1 ml-1 uppercase tracking-widest">Địa chỉ</label>
                    <input type="text" id="editModalAddress" class="w-full px-5 py-3 rounded-xl bg-black border border-pink-900/40 focus:border-pink-500 text-sm text-white font-medium outline-none">
                </div>
                <div>
                    <label class="block text-[10px] text-gray-500 font-bold mb-1 ml-1 uppercase tracking-widest">Món ngon nên thử</label>
                    <input type="text" id="editModalDish" class="w-full px-5 py-3 rounded-xl bg-black border border-pink-900/40 focus:border-pink-500 text-sm text-white font-medium outline-none">
                </div>
                <div>
                    <label class="block text-[10px] text-gray-500 font-bold mb-1 ml-1 uppercase tracking-widest">Ghi chú / Kỷ niệm</label>
                    <textarea id="modalNoteInput" rows="3" class="w-full px-5 py-3 rounded-xl bg-black border border-pink-900/40 focus:border-pink-500 text-sm text-white font-medium outline-none" placeholder="Cảm nghĩ của Vân nè..."></textarea>
                </div>
            </div>

            <div class="flex gap-3 mt-8">
                <button onclick="closeModal()" class="flex-1 py-3 text-gray-500 text-xs font-bold hover:text-white transition-all">Hủy</button>
                <button id="saveModalBtn" class="flex-1 py-3 btn-bp-gradient rounded-lg text-xs font-bold shadow-lg">Lưu thay đổi</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-12 left-1/2 -translate-x-1/2 btn-bp-gradient px-10 py-4 rounded-lg shadow-2xl opacity-0 transition-all z-[100] pointer-events-none text-xs font-bold flex items-center gap-3">
        <i class="fas fa-star animate-pulse"></i> <span id="toastMsg">Thành công</span>
    </div>

    <script>
        let currentTab = 'wishlist';
        let editingId = null;
        let pendingStatus = null;

        function toTitleCase(str) {
            if (!str) return "";
            return str.split(' ').map(word => {
                return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
            }).join(' ');
        }

        let defaultData = [
            { id: 1, name: "Bánh bao phô mai thịt xiên nướng", address: "134 Phù Đổng", time: "Chiều tối", dish: "Thịt xiên nướng, bánh bao phô mai", status: "wishlist", note: "" },
            { id: 4, name: "Bánh mì Ông Minh", address: "4 Phù Đổng", time: "Sáng/Chiều", dish: "Bánh mì gà xé, Pate truyền thống", status: "visited_ok", note: "Vân khen ngon nhất luôn" },
            { id: 5, name: "Bánh mì nướng Phù Đổng", address: "Gần ngã tư Phù Đổng", time: "", dish: "Bánh mì muối ớt", status: "visited_ok", note: "Ăn vặt cực hợp cho vợ" }
        ];

        let restaurants = JSON.parse(localStorage.getItem('thuyVanFood_v14'));
        if (!restaurants || restaurants.length === 0) {
            restaurants = defaultData;
            localStorage.setItem('thuyVanFood_v14', JSON.stringify(restaurants));
        }

        function saveData() {
            localStorage.setItem('thuyVanFood_v14', JSON.stringify(restaurants));
            renderList(document.getElementById('searchInput').value);
            updateCounts();
        }

        function updateCounts() {
            document.getElementById('count-wishlist').innerText = restaurants.filter(r => r.status === 'wishlist').length;
            document.getElementById('count-visited_ok').innerText = restaurants.filter(r => r.status === 'visited_ok').length;
            document.getElementById('count-visited_bad').innerText = restaurants.filter(r => r.status === 'visited_bad').length;
        }

        function changeTab(tab) {
            currentTab = tab;
            ['wishlist', 'visited_ok', 'visited_bad'].forEach(t => {
                const el = document.getElementById(`tab-${t}`);
                el.className = (t === tab) ? 'flex-1 py-3 rounded-lg text-xs font-bold transition-all tab-active' : 'flex-1 py-3 rounded-lg text-xs font-bold text-gray-500 transition-all';
            });
            renderList();
        }

        function openEditModal(id, targetStatus = null) {
            editingId = id;
            pendingStatus = targetStatus;
            const res = restaurants.find(r => r.id === id);
            
            // Điền thông tin vào form
            document.getElementById('editModalName').value = res.name;
            document.getElementById('editModalAddress').value = res.address;
            document.getElementById('editModalDish').value = res.dish;
            document.getElementById('modalNoteInput').value = res.note || "";
            
            const titles = { 
                'visited_ok': ['Tuyệt vời quá! ✨', 'Ghi lại món Vân yêu thích nhất'], 
                'visited_bad': ['Hơi tiếc một chút 🖤', 'Lần sau mình né quán này ra nhé'], 
                'default': ['Chỉnh sửa thông tin', 'Cập nhật lại cho chính xác'] 
            };
            
            const set = titles[targetStatus] || titles['default'];
            document.getElementById('modalTitle').innerText = set[0];
            document.getElementById('modalSubtitle').innerText = set[1];
            
            document.getElementById('noteModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('noteModal').classList.add('hidden');
            editingId = null;
            pendingStatus = null;
        }

        document.getElementById('saveModalBtn').onclick = () => {
            const index = restaurants.findIndex(r => r.id === editingId);
            if (index === -1) return;

            // Cập nhật tất cả các trường
            restaurants[index].name = toTitleCase(document.getElementById('editModalName').value.trim());
            restaurants[index].address = document.getElementById('editModalAddress').value.trim();
            restaurants[index].dish = toTitleCase(document.getElementById('editModalDish').value.trim());
            restaurants[index].note = document.getElementById('modalNoteInput').value.trim();
            
            if (pendingStatus) restaurants[index].status = pendingStatus;
            
            saveData();
            closeModal();
            showToast('Đã lưu thay đổi! 🎀');
        }

        function deleteItem(id) {
            if(confirm('Xóa quán này khỏi danh sách nhé?')) {
                restaurants = restaurants.filter(r => r.id !== id);
                saveData();
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 3000);
        }

        function renderList(query = '') {
            const container = document.getElementById('restaurantList');
            container.innerHTML = '';
            const filtered = restaurants.filter(r => 
                r.status === currentTab && 
                (r.name.toLowerCase().includes(query.toLowerCase()) || r.dish.toLowerCase().includes(query.toLowerCase()))
            );
            document.getElementById('emptyState').classList.toggle('hidden', filtered.length > 0);

            filtered.forEach(res => {
                const card = document.createElement('div');
                card.className = 'journal-card p-6';
                
                card.innerHTML = `
                    <div class="w-full">
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="text-base font-bold text-white leading-tight">${res.name}</h3>
                            <span class="text-[9px] font-bold text-pink-500 uppercase whitespace-nowrap ml-3 bg-pink-500/10 px-2 py-1 rounded border border-pink-500/20">${res.time || 'Mọi lúc'}</span>
                        </div>
                        <div class="text-[11px] text-gray-500 font-semibold mb-4 flex items-center">
                            <i class="fas fa-map-pin mr-2 text-pink-600 text-[10px]"></i> ${res.address}
                        </div>
                        <div class="bg-black/40 p-4 rounded-xl border border-pink-900/20 shadow-inner">
                            <span class="text-[13px] text-pink-100 font-medium leading-relaxed">${res.dish}</span>
                        </div>
                        ${res.note ? `<p onclick="openEditModal(${res.id})" class="text-[12px] text-pink-500 font-medium italic mt-4 line-clamp-2 cursor-pointer bg-pink-500/5 py-2 px-4 rounded-lg border border-pink-500/10 inline-block">✨ "${res.note}"</p>` : ''}
                        
                        <div class="flex items-center justify-between mt-6">
                            <div class="flex gap-3">
                                ${res.status === 'wishlist' ? `
                                    <button onclick="openEditModal(${res.id}, 'visited_ok')" class="square-btn bg-emerald-500/20 text-emerald-500 border border-emerald-500/30 hover:bg-emerald-500 hover:text-white" title="Thích cực ✨">
                                        <i class="fas fa-check"></i>
                                    </button>
                                    <button onclick="openEditModal(${res.id}, 'visited_bad')" class="square-btn bg-rose-500/20 text-rose-500 border border-rose-500/30 hover:bg-rose-500 hover:text-white" title="Không hợp 🖤">
                                        <i class="fas fa-times"></i>
                                    </button>
                                ` : `
                                    <button onclick="restaurants[restaurants.findIndex(r=>r.id==${res.id})].status='wishlist'; saveData();" class="flex items-center gap-2 px-4 py-2 bg-pink-600/10 text-pink-500 text-[10px] font-bold uppercase rounded border border-pink-500/20 hover:bg-pink-600 hover:text-white transition-all">
                                        <i class="fas fa-redo-alt"></i> Ăn lại
                                    </button>
                                `}
                            </div>
                            
                            <div class="flex gap-2">
                                <button onclick="openEditModal(${res.id})" class="p-2 text-gray-600 hover:text-white transition-colors" title="Sửa thông tin"><i class="fas fa-edit text-[14px]"></i></button>
                                <button onclick="deleteItem(${res.id})" class="p-2 text-gray-600 hover:text-rose-500 transition-colors" title="Xóa"><i class="fas fa-trash text-[14px]"></i></button>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        document.getElementById('restaurantForm').onsubmit = function(e) {
            e.preventDefault();
            const rawName = document.getElementById('resName').value.trim();
            const rawDish = document.getElementById('resDish').value.trim();
            
            const newItem = {
                id: Date.now(),
                name: toTitleCase(rawName), 
                address: document.getElementById('resAddress').value,
                time: document.getElementById('resTime').value,
                dish: toTitleCase(rawDish),
                status: document.getElementById('resStatus').value,
                note: ""
            };
            restaurants.unshift(newItem);
            saveData();
            this.reset();
            showToast('Đã thêm quán mới! 💖');
        };

        function downloadBackup() {
            const dataStr = JSON.stringify(restaurants, null, 2);
            const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
            const link = document.createElement('a');
            link.setAttribute('href', dataUri);
            link.setAttribute('download', `DO_NGON_CHO_VO_${new Date().getTime()}.json`);
            link.click();
            showToast('Đã lưu file dữ liệu! 💿');
        }

        function importBackup(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    if (Array.isArray(importedData)) {
                        restaurants = importedData;
                        saveData();
                        showToast('Đã nạp dữ liệu thành công! 🎧');
                    }
                } catch (err) { showToast('File không hợp lệ! ❌'); }
            };
            reader.readAsText(file);
        }

        function exportToZalo() {
            let text = `🌸 DANH SÁCH ĐỒ NGON CHO VỢ 🌸\n\n`;
            const groups = { 'wishlist': '📌 DANH SÁCH CHỜ', 'visited_ok': '✨ YÊU THÍCH', 'visited_bad': '🖤 BỎ QUA' };
            Object.keys(groups).forEach(key => {
                const list = restaurants.filter(r => r.status === key);
                if(list.length > 0) {
                    text += `${groups[key]}:\n`;
                    list.forEach((r, i) => {
                        text += `${i+1}. ${r.name}\n   - Đ/c: ${r.address}\n   - Món: ${r.dish}${r.note ? `\n   - Note: ${r.note}` : ''}\n\n`;
                    });
                }
            });
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showToast('Đã sao chép danh sách! 🚀');
        }

        document.getElementById('searchInput').oninput = (e) => renderList(e.target.value);
        window.onload = () => { updateCounts(); renderList(); };
    </script>
</body>
</html>
