<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đồ ăn ngon cho công chúa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #ffafbd;
            --soft-rose: #ffc3a0;
            --deep-pink: #ff85a1;
            --light-pink: #fffafa;
            --text-color: #5d4037;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--light-pink);
            color: var(--text-color);
            /* Hình nền đồ ăn mờ phía dưới */
            background-image: linear-gradient(rgba(255, 250, 250, 0.92), rgba(255, 250, 250, 0.92)), 
                              url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=1000&q=80');
            background-attachment: fixed;
            background-size: cover;
        }

        .journal-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(255, 133, 161, 0.08);
            border: 1px solid rgba(255, 228, 233, 0.5);
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .journal-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 24px rgba(255, 133, 161, 0.15);
            background: rgba(255, 255, 255, 1);
        }

        .input-focus:focus {
            border-color: var(--deep-pink);
            ring: 2px solid var(--deep-pink);
            outline: none;
        }

        .btn-pink-gradient {
            background: linear-gradient(135deg, #ff85a1, #ffafbd);
            color: white;
            transition: all 0.3s ease;
        }

        .tab-active {
            color: white;
            font-weight: 700;
            background: var(--deep-pink);
            box-shadow: 0 4px 12px rgba(255, 133, 161, 0.25);
        }

        @keyframes heartBeat {
            0% { transform: scale(1); }
            14% { transform: scale(1.15); }
            28% { transform: scale(1); }
            42% { scale(1.15); }
            70% { transform: scale(1); }
        }

        .heart-icon {
            display: inline-block;
            animation: heartBeat 1.8s infinite;
            color: #ff4d6d;
        }

        .shyn-logo {
            font-size: 0.875rem; /* text-sm */
            font-weight: 800;
            letter-spacing: 0.2em;
            background: linear-gradient(to right, #ff4d6d, #ff85a1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        @media (max-width: 640px) {
            .btn-action-mobile {
                padding: 0.6rem 0.6rem !important;
                font-size: 16px !important;
            }
        }

        .card-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.25rem;
        }

        @media (min-width: 1024px) {
            .card-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body class="min-h-screen pb-24">

    <header class="pt-12 pb-8 px-6 text-center">
        <div class="max-w-4xl mx-auto flex flex-col items-center">
            <!-- Tiêu đề chính đã đổi theo yêu cầu -->
            <h1 class="text-xl md:text-2xl font-bold text-pink-600 mb-1 tracking-widest uppercase">
                Đồ ăn ngon cho công chúa
            </h1>
            
            <!-- Logo NhokShyn thu nhỏ -->
            <div class="flex items-center gap-2">
                <span class="shyn-logo">NhokShyn</span>
                <i class="fas fa-heart text-[10px] heart-icon"></i>
            </div>

            <!-- Thanh trang trí tinh giản -->
            <div class="flex items-center gap-3 mt-5 opacity-40">
                <span class="h-[1px] w-12 bg-pink-400"></span>
                <i class="fas fa-utensils text-[9px] text-pink-500"></i>
                <span class="h-[1px] w-12 bg-pink-400"></span>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4">
        
        <!-- Nút lưu/nạp/gửi -->
        <div class="flex flex-wrap gap-2 mb-10 justify-center">
             <button onclick="exportToZalo()" class="bg-[#0084FF] hover:bg-blue-600 text-white px-5 py-2 rounded-full text-[9px] font-bold uppercase tracking-widest shadow-md transition-all flex items-center gap-2">
                <i class="fas fa-paper-plane"></i> Gửi Zalo
            </button>
            <button onclick="downloadBackup()" class="bg-pink-400 hover:bg-pink-500 text-white px-5 py-2 rounded-full text-[9px] font-bold uppercase tracking-widest shadow-md transition-all flex items-center gap-2">
                <i class="fas fa-cloud-download-alt"></i> Lưu File
            </button>
            <label class="bg-rose-300 hover:bg-rose-400 text-white px-5 py-2 rounded-full text-[9px] font-bold uppercase tracking-widest shadow-md transition-all flex items-center gap-2 cursor-pointer">
                <i class="fas fa-cloud-upload-alt"></i> Nạp File
                <input type="file" id="importFile" class="hidden" accept=".json" onchange="importBackup(event)">
            </label>
        </div>

        <!-- Form thêm mới -->
        <section class="mb-10">
            <details class="bg-white/80 backdrop-blur rounded-[24px] shadow-sm border border-pink-100 overflow-hidden group">
                <summary class="list-none p-4 cursor-pointer flex justify-between items-center text-pink-500 font-bold uppercase text-[10px] tracking-[0.15em]">
                    <span><i class="fas fa-plus-circle mr-2"></i> Thêm quán mới</span>
                    <i class="fas fa-chevron-down transition-transform group-open:rotate-180"></i>
                </summary>
                <div class="p-6 pt-2 border-t border-pink-50">
                    <form id="restaurantForm" class="grid grid-cols-1 md:grid-cols-12 gap-4">
                        <div class="md:col-span-6">
                            <input type="text" id="resName" required placeholder="Tên Quán..." class="w-full px-4 py-3 rounded-xl bg-pink-50/30 border border-transparent input-focus text-sm font-medium">
                        </div>
                        <div class="md:col-span-6">
                            <input type="text" id="resAddress" required placeholder="Địa chỉ..." class="w-full px-4 py-3 rounded-xl bg-pink-50/30 border border-transparent input-focus text-sm font-medium">
                        </div>
                        <div class="md:col-span-12">
                            <input type="text" id="resDish" required placeholder="Những món nên ăn (phân cách bởi dấu phẩy)..." class="w-full px-4 py-3 rounded-xl bg-pink-50/30 border border-transparent input-focus text-sm font-medium">
                        </div>
                        <div class="md:col-span-6">
                            <input type="text" id="resTime" placeholder="Ghi chú thêm (giờ mở, vị trí...)" class="w-full px-4 py-3 rounded-xl bg-pink-50/30 border border-transparent input-focus text-sm font-medium">
                        </div>
                        <div class="md:col-span-6">
                            <select id="resStatus" class="w-full px-4 py-3 rounded-xl bg-pink-50/30 border border-transparent input-focus text-sm cursor-pointer font-bold text-pink-600">
                                <option value="wishlist">Đợi dắt vợ đi ăn 💌</option>
                                <option value="visited_ok">Trải nghiệm OK ✨</option>
                                <option value="visited_bad">Trải nghiệm không OK 🍋</option>
                            </select>
                        </div>
                        <div class="md:col-span-12 flex justify-center mt-2">
                            <button type="submit" class="btn-pink-gradient px-12 py-3 rounded-full font-bold uppercase text-[10px] tracking-widest shadow-lg">
                                Thêm vào sổ tay
                            </button>
                        </div>
                    </form>
                </div>
            </details>
        </section>

        <!-- Tabs & Tìm kiếm -->
        <div class="flex flex-col gap-5 mb-10">
            <div class="flex bg-white/50 backdrop-blur-md p-1.5 rounded-full border border-pink-100 shadow-sm">
                <button onclick="changeTab('wishlist')" id="tab-wishlist" class="flex-1 py-2.5 rounded-full text-[10px] font-bold transition-all tab-active">
                    CHỜ ĂN (<span id="count-wishlist">0</span>)
                </button>
                <button onclick="changeTab('visited_ok')" id="tab-visited_ok" class="flex-1 py-2.5 rounded-full text-[10px] font-bold text-pink-300 transition-all">
                    ĂN OK (<span id="count-visited_ok">0</span>)
                </button>
                <button onclick="changeTab('visited_bad')" id="tab-visited_bad" class="flex-1 py-2.5 rounded-full text-[10px] font-bold text-pink-300 transition-all">
                    KHÔNG OK (<span id="count-visited_bad">0</span>)
                </button>
            </div>
            
            <div class="relative">
                <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-pink-300"></i>
                <input type="text" id="searchInput" placeholder="Tìm tên quán hoặc món ngon..." 
                    class="w-full bg-white/90 border border-pink-100 rounded-full px-12 py-3 text-sm focus:ring-2 focus:ring-pink-200 focus:outline-none shadow-sm font-medium">
            </div>
        </div>

        <div id="restaurantList" class="card-grid"></div>

        <div id="emptyState" class="hidden text-center py-20 bg-white/50 backdrop-blur rounded-[40px] border-2 border-dashed border-pink-200/50">
            <i class="fas fa-cookie-bite text-pink-200 text-4xl mb-3 opacity-50"></i>
            <p class="text-pink-300 uppercase tracking-[0.2em] text-[10px] font-bold">Mục này chưa có quán nào nè</p>
        </div>
    </main>

    <!-- Modal ghi chú -->
    <div id="noteModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-pink-900/10 backdrop-blur-md" onclick="closeModal()"></div>
        <div class="bg-white rounded-[32px] p-8 shadow-2xl relative z-10 w-full max-w-sm border border-pink-50">
            <h3 id="modalTitle" class="text-lg font-bold mb-1 text-pink-600 text-center uppercase tracking-wider"></h3>
            <p id="modalSubtitle" class="text-pink-300 text-[10px] uppercase tracking-widest mb-6 text-center font-bold"></p>
            <textarea id="modalNoteInput" rows="4" class="w-full px-5 py-4 rounded-2xl bg-pink-50/50 border-transparent focus:bg-white input-focus text-sm text-pink-900 font-medium leading-relaxed" placeholder="Vân thấy sao về quán này nè..."></textarea>
            <div class="flex gap-3 mt-6">
                <button onclick="closeModal()" class="flex-1 py-3 text-pink-300 text-[10px] font-bold uppercase tracking-widest hover:text-pink-500">Hủy</button>
                <button id="saveModalBtn" class="flex-1 py-3 btn-pink-gradient rounded-full text-[10px] font-bold uppercase tracking-widest shadow-lg">Lưu kỷ niệm</button>
            </div>
        </div>
    </div>

    <!-- Thông báo -->
    <div id="toast" class="fixed bottom-12 left-1/2 -translate-x-1/2 btn-pink-gradient px-8 py-3 rounded-full shadow-2xl opacity-0 transition-all z-[100] pointer-events-none text-[11px] font-bold flex items-center gap-2 whitespace-nowrap">
        <i class="fas fa-magic"></i> <span id="toastMsg">Thành công!</span>
    </div>

    <script>
        let currentTab = 'wishlist';
        let editingId = null;
        let pendingStatus = null;

        function toTitleCase(str) {
            if (!str) return "";
            return str.toLowerCase().split(' ').map(word => {
                return word.charAt(0).toUpperCase() + word.slice(1);
            }).join(' ');
        }

        let defaultData = [
            { id: 1, name: "Bánh Bao Phô Mai Thịt Xiên Nướng", address: "134 Phù Đổng", time: "Thường bán chiều tối", dish: "Thịt xiên nướng, bánh bao phô mai", status: "wishlist", note: "" },
            { id: 2, name: "Quán Tú Mơ", address: "Khu vực Ngô Quyền", time: "", dish: "Cà tím Tú Mơ, Vịt lộn nấu bầu", status: "wishlist", note: "" },
            { id: 3, name: "Lẩu Bò Tiềm Yersin", address: "Yersin", time: "", dish: "Lẩu bò tiềm, Gỏi bò tái chanh", status: "wishlist", note: "" },
            { id: 4, name: "Bánh Mì Ông Minh", address: "4 Phù Đổng", time: "Bán sáng/chiều", dish: "Bánh mì gà xé, Pate truyền thống", status: "visited_ok", note: "Vân khen ngon nhất luôn" },
            { id: 5, name: "Bánh Mì Nướng Phù Đổng", address: "Gần ngã tư Phù Đổng", time: "", dish: "Bánh mì muối ớt", status: "visited_ok", note: "Ăn vặt cực hợp cho vợ" }
        ];

        let restaurants = JSON.parse(localStorage.getItem('thuyVanFood_v13'));
        if (!restaurants || restaurants.length === 0) {
            restaurants = defaultData;
            localStorage.setItem('thuyVanFood_v13', JSON.stringify(restaurants));
        }

        function saveData() {
            localStorage.setItem('thuyVanFood_v13', JSON.stringify(restaurants));
            renderList(document.getElementById('searchInput').value);
            updateCounts();
        }

        function downloadBackup() {
            const dataStr = JSON.stringify(restaurants, null, 2);
            const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
            const link = document.createElement('a');
            link.setAttribute('href', dataUri);
            link.setAttribute('download', `FOOD_VAN_${new Date().getTime()}.json`);
            link.click();
            showToast('Đã lưu file vào máy rồi nhé! 💾');
        }

        function importBackup(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    if (Array.isArray(importedData)) {
                        if (confirm('Bạn có muốn nạp dữ liệu từ file này không?')) {
                            restaurants = importedData;
                            saveData();
                            showToast('Đã nạp xong toàn bộ quán! 🎉');
                        }
                    }
                } catch (err) { showToast('File này không đọc được rồi! ❌'); }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        function updateCounts() {
            document.getElementById('count-wishlist').innerText = restaurants.filter(r => r.status === 'wishlist').length;
            document.getElementById('count-visited_ok').innerText = restaurants.filter(r => r.status === 'visited_ok').length;
            document.getElementById('count-visited_bad').innerText = restaurants.filter(r => r.status === 'visited_bad').length;
        }

        function changeTab(tab) {
            currentTab = tab;
            ['wishlist', 'visited_ok', 'visited_bad'].forEach(t => {
                const el = document.getElementById(`tab-${t}`);
                el.className = (t === tab) ? 'flex-1 py-2.5 rounded-full text-[10px] font-bold transition-all tab-active' : 'flex-1 py-2.5 rounded-full text-[10px] font-bold text-pink-300 transition-all';
            });
            renderList();
        }

        function exportToZalo() {
            let text = `🌸 DANH SÁCH MÓN NGON CỦA VÂN 🌸\n\n`;
            const groups = { 'wishlist': '📌 ĐANG CHỜ DẮT ĐI', 'visited_ok': '✨ NGON QUÁ TRỜI LUÔN', 'visited_bad': '🍋 KHÔNG HỢP KHẨU VỊ' };
            Object.keys(groups).forEach(key => {
                const list = restaurants.filter(r => r.status === key);
                if(list.length > 0) {
                    text += `${groups[key]}:\n`;
                    list.forEach((r, i) => {
                        text += `${i+1}. ${r.name}\n   - Đ/c: ${r.address}\n   - Món: ${r.dish}${r.note ? `\n   - Note: ${r.note}` : ''}\n\n`;
                    });
                }
            });
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showToast('Đã copy danh sách để gửi Zalo! 🚀');
        }

        function openReviewModal(id, targetStatus = null) {
            editingId = id;
            pendingStatus = targetStatus;
            const res = restaurants.find(r => r.id === id);
            document.getElementById('modalNoteInput').value = res.note || "";
            
            const titles = { 'visited_ok': ['Ăn ngon đúng không nè? ✨', 'Ghi lại món Vân thích nhất nào'], 'visited_bad': ['Tiếc quá quán này 🍋', 'Lần sau mình né quán này nha'], 'default': ['Chỉnh sửa thông tin', 'Cập nhật lại ghi chú cho Vân'] };
            const set = titles[targetStatus] || titles['default'];
            document.getElementById('modalTitle').innerText = set[0];
            document.getElementById('modalSubtitle').innerText = set[1];
            
            document.getElementById('noteModal').classList.remove('hidden');
            setTimeout(() => document.getElementById('modalNoteInput').focus(), 100);
        }

        function closeModal() {
            document.getElementById('noteModal').classList.add('hidden');
            editingId = null;
            pendingStatus = null;
        }

        document.getElementById('saveModalBtn').onclick = () => {
            const index = restaurants.findIndex(r => r.id === editingId);
            restaurants[index].note = document.getElementById('modalNoteInput').value;
            if (pendingStatus) restaurants[index].status = pendingStatus;
            saveData();
            closeModal();
            showToast('Đã lưu kỷ niệm vào sổ rồi! ❤️');
        }

        function deleteItem(id) {
            if(confirm('Xóa quán này khỏi sổ tay nhé?')) {
                restaurants = restaurants.filter(r => r.id !== id);
                saveData();
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 3000);
        }

        function renderList(query = '') {
            const container = document.getElementById('restaurantList');
            container.innerHTML = '';
            const filtered = restaurants.filter(r => 
                r.status === currentTab && 
                (r.name.toLowerCase().includes(query.toLowerCase()) || r.dish.toLowerCase().includes(query.toLowerCase()))
            );
            document.getElementById('emptyState').classList.toggle('hidden', filtered.length > 0);

            filtered.forEach(res => {
                const card = document.createElement('div');
                card.className = 'journal-card p-5 md:p-6 flex flex-col md:flex-row gap-5 items-start md:items-center';
                card.innerHTML = `
                    <div class="flex-1 w-full">
                        <div class="flex justify-between items-start mb-1.5">
                            <h3 class="text-[15px] font-bold text-pink-800 leading-snug uppercase tracking-tight">${res.name}</h3>
                            <span class="text-[9px] font-bold text-pink-300 uppercase whitespace-nowrap ml-3 bg-pink-50 px-2 py-0.5 rounded-md">${res.time || ''}</span>
                        </div>
                        <div class="text-[10px] text-pink-400 font-bold mb-3 uppercase tracking-wider flex items-center">
                            <i class="fas fa-location-dot mr-1.5 text-pink-200"></i> ${res.address}
                        </div>
                        <div class="bg-pink-50/50 p-3 rounded-2xl border border-pink-100/50">
                            <span class="text-[12px] text-pink-900 font-bold leading-relaxed">${res.dish}</span>
                        </div>
                        ${res.note ? `<p onclick="openReviewModal(${res.id})" class="text-[11px] text-pink-500 font-semibold italic mt-3 line-clamp-1 cursor-pointer bg-white/50 py-1 px-2 rounded-lg inline-block border border-pink-50">💬 "${res.note}"</p>` : ''}
                    </div>

                    <div class="flex md:flex-col gap-2.5 w-full md:w-auto border-t md:border-t-0 md:border-l border-pink-100 pt-4 md:pt-0 md:pl-5">
                        ${res.status === 'wishlist' ? `
                            <div class="flex gap-2 w-full">
                                <button onclick="openReviewModal(${res.id}, 'visited_ok')" class="btn-action-mobile flex-1 text-white bg-emerald-400 py-2.5 rounded-xl hover:bg-emerald-500 transition-all flex items-center justify-center shadow-sm"><i class="fas fa-heart-circle-check"></i></button>
                                <button onclick="openReviewModal(${res.id}, 'visited_bad')" class="btn-action-mobile flex-1 text-white bg-rose-400 py-2.5 rounded-xl hover:bg-rose-500 transition-all flex items-center justify-center shadow-sm"><i class="fas fa-heart-circle-xmark"></i></button>
                            </div>
                        ` : `<button onclick="restaurants[restaurants.findIndex(r=>r.id==${res.id})].status='wishlist'; saveData();" class="btn-action-mobile flex-1 text-[10px] font-bold uppercase text-pink-500 bg-pink-50/80 py-2.5 rounded-xl hover:bg-pink-100 transition-all flex items-center justify-center gap-2"><i class="fas fa-rotate-left"></i> Ăn lại</button>`}
                        <button onclick="deleteItem(${res.id})" class="p-2.5 text-pink-200 hover:text-red-400 transition-colors text-center hidden md:block"><i class="fas fa-trash-alt text-[11px]"></i></button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        document.getElementById('restaurantForm').onsubmit = function(e) {
            e.preventDefault();
            const rawName = document.getElementById('resName').value.trim();
            const rawDish = document.getElementById('resDish').value.trim();
            
            const newItem = {
                id: Date.now(),
                name: toTitleCase(rawName), 
                address: document.getElementById('resAddress').value,
                time: document.getElementById('resTime').value,
                dish: toTitleCase(rawDish),
                status: document.getElementById('resStatus').value,
                note: ""
            };
            restaurants.unshift(newItem);
            saveData();
            this.reset();
            showToast('Đã thêm món mới vào sổ tay rồi! ❤️');
        };

        document.getElementById('searchInput').oninput = (e) => renderList(e.target.value);
        window.onload = () => { updateCounts(); renderList(); };
    </script>
</body>
</html>
